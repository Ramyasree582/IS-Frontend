{% extends 'base_auth.html' %}

{% block title %}Forgot Password{% endblock %}

{% block auth_content %}
<h2 class="auth-heading">Forgot password?</h2>
<p class="auth-subheading">Enter your faculty email and we'll send you a one-time password to reset it.</p>

<form method="post" class="auth-form">
  {% csrf_token %}

  <div class="form-field">
    <label for="email" class="form-label">Faculty email</label>
    <input type="email" name="email" id="email" value="{{ email|default:'' }}" required>
  </div>

  <button type="submit" class="btn btn-primary btn-full btn-lg">
    Send OTP
  </button>

  <div class="auth-footer">
    <a href="{% url 'accounts:login' %}">Back to login</a>
  </div>
</form>
{% endblock %}
