{% extends 'base_auth.html' %}

{% block title %}Reset Password{% endblock %}

{% block auth_content %}
<h2 class="auth-heading">Reset your password</h2>
<p class="auth-subheading">Enter the OTP and choose a new password.</p>

<form method="post" class="auth-form">
  {% csrf_token %}

  <div class="form-field">
    <label for="email" class="form-label">Email</label>
    <input type="email" name="email" id="email" value="{{ email|default:'' }}" required>
  </div>

  <div class="form-field">
    <label for="code" class="form-label">OTP code</label>
    <input type="text" name="code" id="code" required>
  </div>

  <div class="form-field">
    <label for="new_password" class="form-label">New password</label>
    <input type="password" name="new_password" id="new_password" required>
  </div>

  <button type="submit" class="btn btn-primary btn-full btn-lg">
    Reset Password
  </button>

  <div class="auth-footer">
    <a href="{% url 'accounts:login' %}">Back to login</a>
  </div>
</form>
{% endblock %}
